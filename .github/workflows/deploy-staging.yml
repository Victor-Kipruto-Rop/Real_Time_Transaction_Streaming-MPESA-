name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [webhook-receiver, kafka-consumer]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging Environment
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.your-domain.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name mpesa-staging-cluster --region us-east-1

      - name: Deploy to Kubernetes
        run: |
          # Update image tags in deployment
          kubectl set image deployment/webhook-receiver \
            webhook-receiver=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-webhook-receiver:staging-${{ github.sha }} \
            -n mpesa-staging
          
          kubectl set image deployment/kafka-consumer \
            kafka-consumer=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-kafka-consumer:staging-${{ github.sha }} \
            -n mpesa-staging
          
          # Wait for rollout
          kubectl rollout status deployment/webhook-receiver -n mpesa-staging --timeout=5m
          kubectl rollout status deployment/kafka-consumer -n mpesa-staging --timeout=5m

      - name: Run database migrations
        run: |
          kubectl run dbt-migrate-${{ github.run_number }} \
            --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dbt:staging-${{ github.sha }} \
            --restart=Never \
            --namespace=mpesa-staging \
            --command -- dbt run
          
          # Wait for migration to complete
          kubectl wait --for=condition=complete job/dbt-migrate-${{ github.run_number }} \
            -n mpesa-staging --timeout=10m

      - name: Verify deployment
        run: |
          # Check pod status
          kubectl get pods -n mpesa-staging
          
          # Test health endpoint
          WEBHOOK_URL=$(kubectl get service webhook-receiver -n mpesa-staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -f https://${WEBHOOK_URL}/health || exit 1

      - name: Run smoke tests
        run: |
          pytest tests/e2e/smoke_tests.py --staging

  notify:
    name: Notify Team
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Staging Deployment ${{ needs.deploy.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment*\n*Status:* ${{ needs.deploy.result }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Deployment"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
