# Docker Compose for Monitoring Stack
version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: mpesa_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerting-rules.yml:/etc/prometheus/alerting-rules.yml
      - ./recording-rules.yml:/etc/prometheus/recording-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: mpesa_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: mpesa_node_exporter
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped
    networks:
      - monitoring

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: mpesa_postgres_exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://data_engineer:change_me@postgres:5432/mpesa_analytics?sslmode=disable"
    restart: unless-stopped
    networks:
      - monitoring
      - default

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: mpesa_redis_exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis:6379"
    restart: unless-stopped
    networks:
      - monitoring
      - default

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: mpesa_kafka_exporter
    ports:
      - "9308:9308"
    command:
      - '--kafka.server=kafka:29092'
    restart: unless-stopped
    networks:
      - monitoring
      - default

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: mpesa_blackbox_exporter
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus_data:
  alertmanager_data:

networks:
  monitoring:
    driver: bridge
  default:
    external:
      name: mpesa_network
